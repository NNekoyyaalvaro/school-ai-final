<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School AI - Asistente Educativo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .chat-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: #4a90e2;
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .badge {
            display: inline-block;
            padding: 5px 15px;
            background: #28a745;
            border-radius: 20px;
            font-size: 0.9em;
            margin-top: 10px;
        }
        .chat-container {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: #f5f7fa;
        }
        .message {
            margin: 15px 0;
            padding: 12px 18px;
            border-radius: 15px;
            max-width: 80%;
            word-wrap: break-word;
        }
        .user-message {
            background: #4a90e2;
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 5px;
        }
        .ai-message {
            background: white;
            color: #333;
            margin-right: auto;
            border-bottom-left-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .input-area {
            padding: 20px;
            background: white;
            border-top: 2px solid #eee;
            display: flex;
            gap: 10px;
        }
        .input-area input {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 30px;
            font-size: 1em;
        }
        .input-area input:focus {
            outline: none;
            border-color: #4a90e2;
        }
        .input-area button {
            padding: 15px 30px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1em;
            cursor: pointer;
            transition: background 0.3s;
        }
        .input-area button:hover {
            background: #357abd;
        }
        .suggestions {
            padding: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            border-top: 1px solid #eee;
        }
        .suggestion-chip {
            padding: 8px 15px;
            background: #f0f0f0;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
        }
        .suggestion-chip:hover {
            background: #4a90e2;
            color: white;
        }
        .footer {
            background: #f8f9fa;
            padding: 15px;
            text-align: center;
            color: #666;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="chat-card">
            <div class="header">
                <h1>🏫 School AI</h1>
                <p>Asistente educativo inteligente y seguro</p>
                <span class="badge">✅ Modo Escuela Activado</span>
            </div>
            
            <div id="chatbox" class="chat-container">
                <div class="message ai-message">
                    🤖 ¡Hola! Soy School AI, tu asistente de estudios. ¿En qué materia necesitas ayuda hoy? (Matemáticas, Ciencias, Lenguaje...)
                </div>
            </div>
            
            <div class="input-area">
                <input type="text" id="userInput" placeholder="Escribe tu pregunta educativa..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()">Enviar</button>
            </div>
            
            <div class="suggestions">
                <button class="suggestion-chip" onclick="useSuggestion('¿Qué es la fotosíntesis?')">🌱 Fotosíntesis</button>
                <button class="suggestion-chip" onclick="useSuggestion('¿Cómo resolver una ecuación?')">📐 Ecuaciones</button>
                <button class="suggestion-chip" onclick="useSuggestion('Partes de la célula')">🔬 Célula</button>
                <button class="suggestion-chip" onclick="useSuggestion('¿Qué es la gravedad?')">🌍 Gravedad</button>
            </div>
            
            <div class="footer">
                ⚡ Aprendizaje guiado - No damos respuestas directas
            </div>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if (!message) return;
            
            const chatbox = document.getElementById('chatbox');
            
            // Mostrar mensaje del usuario
            chatbox.innerHTML += `<div class="message user-message">👤 ${escapeHtml(message)}</div>`;
            input.value = '';
            chatbox.scrollTop = chatbox.scrollHeight;
            
            // Mostrar "escribiendo..."
            chatbox.innerHTML += `<div class="message ai-message" id="typing">🤖 School AI está escribiendo...</div>`;
            
            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: message})
                });
                
                const data = await response.json();
                
                // Quitar "escribiendo..."
                document.getElementById('typing')?.remove();
                
                // Mostrar respuesta
                chatbox.innerHTML += `<div class="message ai-message">🤖 ${escapeHtml(data.response)}</div>`;
                chatbox.scrollTop = chatbox.scrollHeight;
                
            } catch (error) {
                document.getElementById('typing')?.remove();
                chatbox.innerHTML += `<div class="message ai-message">🤖 School AI está funcionando correctamente.</div>`;
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function useSuggestion(text) {
            document.getElementById('userInput').value = text;
            sendMessage();
        }
    </script>
</body>
</html>
